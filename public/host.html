<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Игры разума — Ведущий</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Arial', sans-serif;
      background: #1a1a2e;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    h1 {
      font-size: 2em;
      color: #e94560;
      margin-bottom: 30px;
    }

    .status {
      font-size: 1.5em;
      margin-bottom: 40px;
      min-height: 50px;
      color: #aaa;
    }

    .controls {
      display: flex;
      gap: 20px;
      margin-bottom: 50px;
    }

    .ctrl-btn {
      padding: 20px 50px;
      font-size: 1.5em;
      font-weight: bold;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.2s;
      color: #fff;
    }
    .ctrl-btn:active {
      transform: scale(0.95);
    }
    .ctrl-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #btn-start {
      background: #27ae60;
      box-shadow: 0 5px 20px rgba(39, 174, 96, 0.4);
    }
    #btn-start:hover:not(:disabled) {
      background: #2ecc71;
    }

    #btn-reset {
      background: #e67e22;
      box-shadow: 0 5px 20px rgba(230, 126, 34, 0.4);
    }
    #btn-reset:hover:not(:disabled) {
      background: #f39c12;
    }

    /* Очередь нажатий */
    .buzz-queue {
      text-align: center;
      min-height: 100px;
    }
    .buzz-first {
      font-size: 12em;
      font-weight: bold;
      color: #e94560;
      text-shadow: 0 0 60px rgba(233, 69, 96, 0.8);
      line-height: 1;
      animation: winPulse 0.8s infinite;
    }
    @keyframes winPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .buzz-rest {
      margin-top: 20px;
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .buzz-rest-item {
      font-size: 2em;
      color: #888;
      background: #16213e;
      padding: 10px 25px;
      border-radius: 12px;
    }
    .buzz-rest-item .pos {
      color: #555;
      margin-right: 5px;
    }

    /* Ожидание */
    .waiting-display {
      display: none;
      text-align: center;
    }
    .waiting-display.visible {
      display: block;
    }
    .waiting-text {
      font-size: 3em;
      color: #f39c12;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <h1>Игры разума — Ведущий</h1>
  <div class="status" id="status">Готово к игре</div>

  <div class="controls">
    <button class="ctrl-btn" id="btn-start" onclick="startRound()">СТАРТ</button>
    <button class="ctrl-btn" id="btn-reset" onclick="resetRound()">СБРОС</button>
  </div>

  <div class="waiting-display" id="waiting-display">
    <div class="waiting-text">Ждём ответ...</div>
  </div>

  <div class="buzz-queue" id="buzz-queue"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    socket.emit('join-host');

    function startRound() {
      socket.emit('start-round');
    }

    function resetRound() {
      socket.emit('reset-round');
    }

    function renderBuzzQueue(order) {
      const container = document.getElementById('buzz-queue');
      container.innerHTML = '';
      if (order.length === 0) return;

      // Первый — крупно
      const first = document.createElement('div');
      first.className = 'buzz-first';
      first.textContent = order[0];
      container.appendChild(first);

      // Остальные — мельче
      if (order.length > 1) {
        const rest = document.createElement('div');
        rest.className = 'buzz-rest';
        for (let i = 1; i < order.length; i++) {
          const item = document.createElement('span');
          item.className = 'buzz-rest-item';
          item.innerHTML = '<span class="pos">' + (i + 1) + '.</span> ' + order[i];
          rest.appendChild(item);
        }
        container.appendChild(rest);
      }

      document.getElementById('waiting-display').classList.remove('visible');
      document.getElementById('status').textContent = `Команда ${order[0]} ответила первой!`;
      document.getElementById('status').style.color = '#e94560';
    }

    socket.on('round-started', () => {
      document.getElementById('status').textContent = 'Раунд идёт!';
      document.getElementById('status').style.color = '#2ecc71';
      document.getElementById('btn-start').disabled = true;
      document.getElementById('buzz-queue').innerHTML = '';
      document.getElementById('waiting-display').classList.add('visible');
    });

    socket.on('team-buzzed', (order) => {
      renderBuzzQueue(order);
    });

    socket.on('round-reset', () => {
      document.getElementById('status').textContent = 'Готово к игре';
      document.getElementById('status').style.color = '#aaa';
      document.getElementById('btn-start').disabled = false;
      document.getElementById('buzz-queue').innerHTML = '';
      document.getElementById('waiting-display').classList.remove('visible');
    });

    socket.on('game-state', (state) => {
      if (state.buzzOrder && state.buzzOrder.length > 0) {
        renderBuzzQueue(state.buzzOrder);
        document.getElementById('btn-start').disabled = true;
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Игры разума — Команда</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Arial', sans-serif;
      background: #1a1a2e;
      color: #fff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    /* --- Экран выбора команды --- */
    #screen-select {
      text-align: center;
      width: 100%;
      padding: 20px;
    }
    #screen-select h1 {
      font-size: 2em;
      margin-bottom: 30px;
      color: #e94560;
    }
    .team-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      max-width: 500px;
      margin: 0 auto;
    }
    .team-btn {
      background: #16213e;
      border: 3px solid #e94560;
      color: #fff;
      font-size: 2em;
      font-weight: bold;
      padding: 25px;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .team-btn:active {
      background: #e94560;
      transform: scale(0.95);
    }

    /* --- Экран ожидания / кнопка --- */
    #screen-game {
      text-align: center;
    }
    .team-label {
      font-size: 1.5em;
      color: #aaa;
      margin-bottom: 20px;
    }
    .status-text {
      font-size: 1.8em;
      margin-bottom: 40px;
      min-height: 50px;
    }
    .buzz-btn {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      border: none;
      font-size: 2em;
      font-weight: bold;
      color: #fff;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      position: relative;
    }
    .buzz-btn.inactive {
      background: #555;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      cursor: not-allowed;
    }
    .buzz-btn.active {
      background: radial-gradient(circle at 40% 35%, #ff4444, #cc0000, #990000);
      box-shadow: 0 10px 40px rgba(233, 69, 96, 0.6);
      animation: pulse 1.5s infinite;
    }
    .buzz-btn.active:active {
      transform: scale(0.93);
      box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 10px 40px rgba(233, 69, 96, 0.6); }
      50% { box-shadow: 0 10px 60px rgba(233, 69, 96, 0.9); }
    }

    /* --- Очередь нажатий --- */
    .buzz-order {
      margin-top: 25px;
      width: 100%;
      max-width: 400px;
    }
    .buzz-order-item {
      padding: 8px 0;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .buzz-order-item.first {
      font-size: 2.5em;
      font-weight: bold;
      color: #e94560;
      padding: 15px 0;
      text-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
    }
    .buzz-order-item.other {
      font-size: 1.3em;
      color: #888;
    }
    .buzz-position {
      color: #555;
      min-width: 30px;
      text-align: right;
    }
    .buzz-order-item.first .buzz-position {
      color: #e94560;
    }

    .screen { display: none !important; }
    .screen.visible {
      display: flex !important;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <!-- Экран 1: выбор команды -->
  <div id="screen-select" class="screen visible" style="">
    <h1 style="color: #e94560; margin-bottom: 10px;">Игры разума</h1>
    <p style="font-size: 1.3em; color: #aaa; margin-bottom: 30px;">Выберите команду</p>
    <div class="team-grid">
      <button class="team-btn" onclick="selectTeam(1)">1</button>
      <button class="team-btn" onclick="selectTeam(2)">2</button>
      <button class="team-btn" onclick="selectTeam(3)">3</button>
      <button class="team-btn" onclick="selectTeam(4)">4</button>
      <button class="team-btn" onclick="selectTeam(5)">5</button>
      <button class="team-btn" onclick="selectTeam(6)">6</button>
      <button class="team-btn" onclick="selectTeam(7)">7</button>
      <button class="team-btn" onclick="selectTeam(8)">8</button>
    </div>
  </div>

  <!-- Экран 2: кнопка -->
  <div id="screen-game" class="screen">
    <h1 style="color: #e94560; margin-bottom: 5px;">Игры разума</h1>
    <div class="team-label">Команда <span id="my-team">?</span></div>
    <div class="status-text" id="status">Ожидание ведущего...</div>
    <button class="buzz-btn inactive" id="buzz-btn" onclick="buzz()" disabled>
      ЖМИТЕ!
    </button>
    <div class="buzz-order" id="buzz-order"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let myTeam = null;

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('visible'));
      document.getElementById(id).classList.add('visible');
    }

    function selectTeam(num) {
      myTeam = num;
      document.getElementById('my-team').textContent = num;
      document.title = 'Игры разума — Команда ' + num;
      socket.emit('join-team', num);
      showScreen('screen-game');
    }

    let myBuzzed = false;

    function buzz() {
      if (myBuzzed) return;
      myBuzzed = true;
      socket.emit('buzz');
      const btn = document.getElementById('buzz-btn');
      btn.classList.remove('active');
      btn.classList.add('inactive');
      btn.disabled = true;
    }

    function renderBuzzOrder(order) {
      const container = document.getElementById('buzz-order');
      container.innerHTML = '';
      order.forEach((teamNum, i) => {
        const div = document.createElement('div');
        div.className = 'buzz-order-item ' + (i === 0 ? 'first' : 'other');
        div.innerHTML = '<span class="buzz-position">' + (i + 1) + '.</span> Команда ' + teamNum;
        container.appendChild(div);
      });
    }

    // Раунд начался
    socket.on('round-started', () => {
      myBuzzed = false;
      showScreen('screen-game');
      const btn = document.getElementById('buzz-btn');
      btn.classList.remove('inactive');
      btn.classList.add('active');
      btn.disabled = false;
      document.getElementById('status').textContent = 'ЖМИТЕ!';
      document.getElementById('buzz-order').innerHTML = '';
    });

    // Кто-то нажал кнопку
    socket.on('team-buzzed', (order) => {
      renderBuzzOrder(order);
    });

    // Раунд сброшен
    socket.on('round-reset', () => {
      myBuzzed = false;
      showScreen('screen-game');
      const btn = document.getElementById('buzz-btn');
      btn.classList.remove('active');
      btn.classList.add('inactive');
      btn.disabled = true;
      document.getElementById('status').textContent = 'Ожидание ведущего...';
      document.getElementById('buzz-order').innerHTML = '';
    });

    // Состояние при подключении
    socket.on('game-state', (state) => {
      if (state.buzzOrder && state.buzzOrder.length > 0) {
        renderBuzzOrder(state.buzzOrder);
      }
    });
  </script>
</body>
</html>
